<!DOCTYPE html>
<html>
 <head>
   <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
   <meta charset="utf-8">
   <title>Complex icons</title>
   <style>
     /* Always set the map height explicitly to define the size of the div
      * element that contains the map. */
     #map {
       height: 100%;
     }
     /* Optional: Makes the sample page fill the window. */
     html, body {
       height: 100%;
       margin: 0;
       padding: 0;
     }
   </style>
 </head>
 <body>
   <div id="map"></div>
   <script>

     // The following example creates complex markers to indicate beaches near
     // Sydney, NSW, Australia. Note that the anchor is set to (0,32) to correspond
     // to the base of the flagpole.

     function initMap() {
       var map = new google.maps.Map(document.getElementById('map'), {
         zoom: 16,
         center: {lat: 36.1221442, lng: -115.1674636}
       });

       setMarkers(map);
      var image = {
        url: 'http://image.flaticon.com/icons/svg/210/210554.svg',
        // This marker is 20 pixels wide by 32 pixels high.
        size: new google.maps.Size(44, 75),
        // The origin for this image is (0, 0).
        origin: new google.maps.Point(0, 0),
        // The anchor for this image is the base of the flagpole at (0, 32).
        anchor: new google.maps.Point(0, 32)
      };
 var beachMarker = new google.maps.Marker({
   position: {lat: 36.1221442, lng: -115.1674636},
   map: map,
   icon: image
 });
   

};

     // Data for the markers consisting of a name, a LatLng and a zIndex for the
     // order in which these markers should display on top of each other.
     
        var beaches = [
      ['Offer1', 36.1221, -115.1, 4],
      ['Offer2', 36.1221, -115.169, 5],
      ['Offer3', 36.1261, -115.167, 3],
      ['Offer4', -36.1261, -115.168, 2],
      ['Offer5', 36.1241, -115.167, 1]
    ];

       
   
       
    function setMarkers(map) {
      // Adds markers to the map.

      // Marker sizes are expressed as a Size of X,Y where the origin of the image
      // (0,0) is located in the top left of the image.

      // Origins, anchor positions and coordinates of the marker increase in the X
      // direction to the right and in the Y direction down.
      var image = {
        url: 'http://image.flaticon.com/icons/svg/138/138233.svg',
        // This marker is 20 pixels wide by 32 pixels high.
        size: new google.maps.Size(20, 32),
        // The origin for this image is (0, 0).
        origin: new google.maps.Point(0, 0),
        // The anchor for this image is the base of the flagpole at (0, 32).
        anchor: new google.maps.Point(0, 32)
      };
      // Shapes define the clickable region of the icon. The type defines an HTML
      // <area> element 'poly' which traces out a polygon as a series of X,Y points.
      // The final coordinate closes the poly by connecting to the first coordinate.
      var shape = {
        coords: [1, 1, 1, 20, 18, 20, 18, 1],
        type: 'poly'
      };
      for (var i = 0; i < beaches.length; i++) {
        var beach = beaches[i];
        var marker = new google.maps.Marker({
          position: {lat: beach[1], lng: beach[2]},
          map: map,
          icon: image,
          shape: shape,
          title: beach[0],
          zIndex: beach[3]
        });
      }
    }
   </script>
   <script async defer
   src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjCRg9r0vk3BgC1_YZZj5bPeIrcxpIe_Q&callback=initMap">
   </script>
 </body>
</html>
